<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>학급별 주간 시간표</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --card: #ffffff;
        --line: #d7dfeb;
        --head: #eaf1ff;
        --text: #1f2937;
        --accent: #2f6feb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Pretendard", "Noto Sans KR", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .page {
        padding: 18px;
      }

      h1 {
        margin: 0 0 14px;
        font-size: 1.5rem;
        text-align: center;
      }

      .usage-guide {
        max-width: 980px;
        margin: 0 auto 14px;
        padding: 12px 14px;
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: 0 2px 10px rgba(23, 42, 70, 0.06);
        line-height: 1.5;
        font-size: 0.9rem;
      }

      .usage-guide strong {
        display: block;
        margin-bottom: 6px;
      }

      .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
        margin: 0 0 14px;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 8px;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
      }

      .control-group label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      .control-group select {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 0.9rem;
        background: #fff;
      }

      .specialist-picker {
        position: relative;
        width: 260px;
      }

      .specialist-toggle {
        width: 100%;
        text-align: left;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 10px;
        background: #fff;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }

      .specialist-menu {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 6px);
        z-index: 20;
        display: none;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 4px 16px rgba(23, 42, 70, 0.12);
        max-height: 260px;
        overflow: auto;
      }

      .specialist-menu.open {
        display: block;
      }

      .subject-options {
        display: grid;
        grid-template-columns: repeat(1, minmax(0, 1fr));
        gap: 8px;
      }

      .subject-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        font-weight: 600;
      }

      .subject-option input {
        margin: 0;
      }

      .timetable-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(220px, 1fr));
        gap: 12px;
        align-items: start;
      }

      .class-card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 10px rgba(23, 42, 70, 0.08);
      }

      .class-title {
        margin: 0;
        padding: 10px;
        background: var(--head);
        border-bottom: 1px solid var(--line);
        text-align: center;
        font-size: 1rem;
        font-weight: 700;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        border: 1px solid var(--line);
        text-align: center;
        font-size: 0.9rem;
        height: 44px;
        padding: 6px;
      }

      thead th {
        background: #f8fbff;
        font-weight: 700;
      }

      .period-col {
        width: 62px;
        background: #f8fbff;
        font-weight: 600;
      }

      .subject-cell {
        position: relative;
        cursor: pointer;
        transition: background-color 0.15s ease;
        color: #111827;
        font-weight: 700;
      }

      .subject-cell:hover {
        filter: brightness(0.96);
      }

      .subject-cell:focus {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
      }

      .cell-restrictions {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }

      .cell-restriction-item {
        position: absolute;
        top: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6b7280;
        font-size: 0.78rem;
        font-weight: 700;
      }

      .pe-picker-modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.35);
        z-index: 100;
      }

      .pe-picker-modal.open {
        display: flex;
      }

      .pe-picker-dialog {
        width: min(90vw, 320px);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.2);
      }

      .pe-picker-dialog h2 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      .pe-picker-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .pe-picker-actions button {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        font-weight: 600;
        cursor: pointer;
        background: #fff;
      }

      .pe-picker-actions .gym-btn {
        background: #86efac;
      }

      .pe-picker-actions .ground-btn {
        background: #c4b5fd;
      }

      .pe-picker-cancel {
        margin-top: 8px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 7px 10px;
        cursor: pointer;
      }

      .section-divider {
        border: 0;
        border-top: 2px dashed #cbd5e1;
        margin: 18px 0 14px;
      }

      .specialist-area-title {
        margin: 0 0 10px;
        text-align: center;
        font-size: 1.15rem;
      }

      .specialist-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
      }

      .specialist-card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
      }

      .specialist-title {
        margin: 0;
        padding: 9px 10px;
        text-align: center;
        font-size: 0.98rem;
        background: #eef2ff;
        border-bottom: 1px solid var(--line);
      }

      @media (max-width: 1400px) {
        .timetable-grid {
          grid-template-columns: repeat(3, minmax(220px, 1fr));
        }
      }

      @media (max-width: 900px) {
        .timetable-grid {
          grid-template-columns: repeat(1, minmax(220px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>학급별 주간 시간표</h1>
      <section class="usage-guide" aria-label="사용 방법 안내">
        <strong>사용 방법</strong>
        반 개수와 최대 교시를 정하고, 중복되면 안 되는 전담 과목/강사 과목을 먼저 선택하세요.
        필요한 과목이 없으면 A~F를 활용할 수 있습니다.
        시간표 칸을 클릭해 과목을 입력하면 전담 과목은 색으로 표시되고, 아래 전담 시간표에도 자동 기록됩니다.
        아래 전담 시간표 칸에 반 번호를 입력하면 같은 요일·교시에 해당 반 시간표에도 동일하게 반영됩니다.
      </section>

      <section class="controls" aria-label="표시 설정">
        <div class="control-group">
          <label for="classCountSelect">반 개수</label>
          <select id="classCountSelect" aria-label="반 개수 선택"></select>
        </div>

        <div class="control-group">
          <label for="periodCountSelect">최대 교시</label>
          <select id="periodCountSelect" aria-label="최대 교시 선택"></select>
        </div>

        <div class="control-group">
          <label for="specialistToggle">전담 과목</label>
          <div class="specialist-picker">
            <button id="specialistToggle" class="specialist-toggle" type="button" aria-expanded="false">
              전담 과목 선택 (복수 선택)
            </button>
            <div id="specialistMenu" class="specialist-menu" role="listbox" aria-multiselectable="true">
              <div id="subjectOptions" class="subject-options"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="timetableGrid" class="timetable-grid" aria-label="시간표"></section>

      <hr class="section-divider" />

      <section id="specialistArea" aria-label="전담 시간표 영역">
        <h2 class="specialist-area-title">전담 시간표</h2>
        <div id="specialistGrid" class="specialist-grid"></div>
      </section>
    </main>

    <div id="pePickerModal" class="pe-picker-modal" aria-hidden="true">
      <div class="pe-picker-dialog" role="dialog" aria-modal="true" aria-label="체육 장소 선택">
        <h2>체육 장소를 선택하세요</h2>
        <div class="pe-picker-actions">
          <button type="button" class="gym-btn" data-pe-place="강당">강당</button>
          <button type="button" class="ground-btn" data-pe-place="운동장">운동장</button>
        </div>
        <button type="button" id="pePickerCancel" class="pe-picker-cancel">취소</button>
      </div>
    </div>

    <script>
      const days = ["월", "화", "수", "목", "금"];
      const specialistSubjects = [
        { name: "영어", color: "#fde68a" },
        { name: "도덕", color: "#fbcfe8" },
        { name: "과학", color: "#bfdbfe" },
        { name: "미술", color: "#fecaca" },
        { name: "음악", color: "#ddd6fe" },
        { name: "체육", color: "#bbf7d0" },
        { name: "실과", color: "#fed7aa" },
        { name: "강사 1", color: "#a7f3d0" },
        { name: "강사 2", color: "#fdba74" },
        { name: "강사 3", color: "#f0abfc" },
        { name: "A", color: "#f9a8d4" },
        { name: "B", color: "#fcd34d" },
        { name: "C", color: "#93c5fd" },
        { name: "D", color: "#86efac" },
        { name: "E", color: "#c4b5fd" },
        { name: "F", color: "#fca5a5" }
      ];

      const classCountSelect = document.getElementById("classCountSelect");
      const periodCountSelect = document.getElementById("periodCountSelect");
      const timetableGrid = document.getElementById("timetableGrid");
      const specialistGrid = document.getElementById("specialistGrid");
      const specialistToggle = document.getElementById("specialistToggle");
      const specialistMenu = document.getElementById("specialistMenu");
      const subjectOptions = document.getElementById("subjectOptions");
      const pePickerModal = document.getElementById("pePickerModal");
      const pePickerCancel = document.getElementById("pePickerCancel");

      let classCount = 6;
      let maxPeriodCount = 6;

      const subjectStore = {};
      const selectedSpecialists = new Set();
      const specialistColorMap = Object.fromEntries(
        specialistSubjects.map((subject) => [subject.name, subject.color])
      );
      const pePlaceColorMap = {
        강당: "#86efac",
        운동장: "#c4b5fd"
      };
      let pePickerResolver = null;

      const buildClasses = (count) =>
        Array.from({ length: count }, (_, index) => `${index + 1}반`);

      const buildPeriods = (count) =>
        Array.from({ length: count }, (_, index) => `${index + 1}교시`);

      const getCellKey = (className, day, period) => `${className}__${day}__${period}`;
      const getSlotKey = (day, period) => `${day}__${period}`;

      function fillSelectOptions(selectElement, start, end, defaultValue) {
        for (let value = start; value <= end; value += 1) {
          const option = document.createElement("option");
          option.value = String(value);
          option.textContent = String(value);
          if (value === defaultValue) {
            option.selected = true;
          }
          selectElement.appendChild(option);
        }
      }

      function isSpecialistSubject(subject) {
        return subject === "체육" || selectedSpecialists.has(subject);
      }

      function getEntry(className, day, period) {
        return subjectStore[getCellKey(className, day, period)] || null;
      }

      function getEntryColor(entry) {
        if (!entry || !isSpecialistSubject(entry.subject)) return "";
        if (entry.subject === "체육" && entry.pePlace) {
          return pePlaceColorMap[entry.pePlace] || "";
        }
        return specialistColorMap[entry.subject] || "";
      }

      function getEntryDisplayText(entry) {
        if (!entry) return "";
        if (entry.subject === "체육" && entry.pePlace) {
          return `체육(${entry.pePlace})`;
        }
        return entry.subject;
      }

      function getRestrictionText(entry) {
        if (!entry) return "";
        if (entry.subject === "체육" && entry.pePlace) {
          return `${entry.pePlace[0]}X`;
        }
        return `${entry.subject[0]}X`;
      }

      function openPePlacePicker(defaultValue = "강당") {
        pePickerModal.classList.add("open");
        pePickerModal.setAttribute("aria-hidden", "false");

        return new Promise((resolve) => {
          pePickerResolver = resolve;
          const defaultButton = pePickerModal.querySelector(`[data-pe-place="${defaultValue}"]`);
          if (defaultButton) defaultButton.focus();
        });
      }

      function closePePlacePicker(selectedPlace = null) {
        pePickerModal.classList.remove("open");
        pePickerModal.setAttribute("aria-hidden", "true");
        if (pePickerResolver) {
          pePickerResolver(selectedPlace);
          pePickerResolver = null;
        }
      }

      function getSlotSpecialistReferences(day, period) {
        const classes = buildClasses(classCount);
        const refs = new Map();

        for (const className of classes) {
          const entry = getEntry(className, day, period);
          if (!entry || !isSpecialistSubject(entry.subject)) continue;
          const color = getEntryColor(entry);
          const key = entry.subject === "체육" ? `체육__${entry.pePlace || ""}` : entry.subject;
          if (color && !refs.has(key)) {
            refs.set(key, { color, text: getRestrictionText(entry) });
          }
        }

        return Array.from(refs.values());
      }

      function buildMultiColorGradient(colors) {
        const size = 100 / colors.length;
        const segments = colors.map((color, index) => {
          const start = (size * index).toFixed(2);
          const end = (size * (index + 1)).toFixed(2);
          return `${color} ${start}% ${end}%`;
        });
        return `linear-gradient(90deg, ${segments.join(", ")})`;
      }

      function getSpecialistTableNames() {
        const names = ["체육"];
        selectedSpecialists.forEach((subject) => {
          if (subject !== "체육") {
            names.push(subject);
          }
        });
        return names;
      }

      function getEntryTableName(entry) {
        if (!entry || !isSpecialistSubject(entry.subject)) return null;
        if (entry.subject === "체육") {
          return "체육";
        }
        return entry.subject;
      }

      function renderSpecialistTimetables() {
        const tableNames = getSpecialistTableNames();
        const periods = buildPeriods(maxPeriodCount);
        const classes = buildClasses(classCount);
        specialistGrid.innerHTML = "";

        tableNames.forEach((tableName) => {
          const card = document.createElement("article");
          card.className = "specialist-card";

          const title = document.createElement("h3");
          title.className = "specialist-title";
          title.textContent = `${tableName} 전담 시간표`;

          const table = document.createElement("table");
          const thead = document.createElement("thead");
          const headerRow = document.createElement("tr");
          const corner = document.createElement("th");
          corner.textContent = "교시";
          headerRow.appendChild(corner);
          days.forEach((day) => {
            const th = document.createElement("th");
            th.textContent = day;
            headerRow.appendChild(th);
          });
          thead.appendChild(headerRow);

          const tbody = document.createElement("tbody");
          periods.forEach((periodLabel, periodIndex) => {
            const period = periodIndex + 1;
            const row = document.createElement("tr");
            const periodCell = document.createElement("th");
            periodCell.className = "period-col";
            periodCell.textContent = periodLabel;
            row.appendChild(periodCell);

            days.forEach((day) => {
              const td = document.createElement("td");
              const matchedEntries = [];

              classes.forEach((className) => {
                const entry = getEntry(className, day, period);
                const entryTableName = getEntryTableName(entry);
                if (entryTableName === tableName) {
                  matchedEntries.push({
                    classNumber: className.replace("반", ""),
                    pePlace: entry?.pePlace || null
                  });
                }
              });

              td.style.fontWeight = "700";
              td.style.color = "#111827";
              td.style.background = "";

              if (tableName === "체육") {
                if (matchedEntries.length === 1) {
                  const entry = matchedEntries[0];
                  if (entry.pePlace === "강당") {
                    td.style.background = pePlaceColorMap["강당"];
                  } else if (entry.pePlace === "운동장") {
                    td.style.background = pePlaceColorMap["운동장"];
                  }
                  td.textContent = entry.classNumber;
                } else if (matchedEntries.length > 1) {
                  const colors = matchedEntries.map((entry) => pePlaceColorMap[entry.pePlace]).filter(Boolean);
                  td.style.backgroundImage = buildMultiColorGradient(colors);
                  td.textContent = matchedEntries
                    .map((entry) => `${entry.pePlace === "강당" ? "강" : "운"}${entry.classNumber}`)
                    .join(" / ");
                } else {
                  td.style.backgroundImage = "";
                  td.textContent = "";
                }
              } else {
                td.style.backgroundImage = "";
                td.textContent = matchedEntries.map((entry) => entry.classNumber).join(", ");
              }

              td.style.cursor = "pointer";
              td.title = "클릭해서 반 번호 입력";
              td.setAttribute("tabindex", "0");
              td.addEventListener("click", () => {
                editSpecialistCell(tableName, day, period);
              });
              td.addEventListener("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                  event.preventDefault();
                  editSpecialistCell(tableName, day, period);
                }
              });
              row.appendChild(td);
            });

            tbody.appendChild(row);
          });

          table.append(thead, tbody);
          card.append(title, table);
          specialistGrid.appendChild(card);
        });
      }

      function clearRestrictionHints(cell) {
        const layer = cell.querySelector(".cell-restrictions");
        if (layer) layer.remove();
      }

      function renderRestrictionHints(cell, refs) {
        clearRestrictionHints(cell);
        if (!refs.length) return;

        const layer = document.createElement("div");
        layer.className = "cell-restrictions";

        const size = 100 / refs.length;
        refs.forEach((ref, index) => {
          const item = document.createElement("span");
          item.className = "cell-restriction-item";
          item.style.left = `${(size * index).toFixed(2)}%`;
          item.style.width = `${size.toFixed(2)}%`;
          item.textContent = ref.text;
          layer.appendChild(item);
        });

        cell.appendChild(layer);
      }

      function applySpecialistSlotColors() {
        document.querySelectorAll(".subject-cell").forEach((cell) => {
          const className = cell.dataset.className;
          const day = cell.dataset.day;
          const period = Number(cell.dataset.period);

          const entry = getEntry(className, day, period);
          const slotRefs = getSlotSpecialistReferences(day, period);
          const slotColors = slotRefs.map((ref) => ref.color);
          clearRestrictionHints(cell);

          if (entry && entry.subject) {
            if (isSpecialistSubject(entry.subject)) {
              cell.style.backgroundImage = "";
              cell.style.backgroundColor = getEntryColor(entry);
            } else {
              cell.style.backgroundColor = "";
              cell.style.backgroundImage = "";
            }
            return;
          }

          if (slotColors.length > 1) {
            cell.style.backgroundImage = buildMultiColorGradient(slotColors);
            cell.style.backgroundColor = "";
            renderRestrictionHints(cell, slotRefs);
          } else if (slotColors.length === 1) {
            cell.style.backgroundImage = "";
            cell.style.backgroundColor = slotColors[0];
            renderRestrictionHints(cell, slotRefs);
          } else {
            cell.style.backgroundColor = "";
            cell.style.backgroundImage = "";
          }
        });
      }

      function hasSpecialistConflict(targetClass, day, period, nextEntry) {
        if (!isSpecialistSubject(nextEntry.subject)) return false;

        const classes = buildClasses(classCount);

        for (const className of classes) {
          if (className === targetClass) continue;

          const existing = getEntry(className, day, period);
          if (!existing || !isSpecialistSubject(existing.subject)) continue;

          if (nextEntry.subject === "체육" && existing.subject === "체육") {
            if (existing.pePlace === nextEntry.pePlace) {
              window.alert(`${day} ${period}교시에는 ${nextEntry.pePlace} 체육이 이미 다른 반에 배치되어 있습니다.`);
              return true;
            }
            continue;
          }

          if (existing.subject === nextEntry.subject) {
            window.alert(`${day} ${period}교시에는 이미 다른 반에 ${nextEntry.subject}이(가) 배치되어 있습니다.`);
            return true;
          }
        }

        return false;
      }

      function assignEntryToClassCell(className, day, period, nextEntry) {
        const key = getCellKey(className, day, period);
        if (hasSpecialistConflict(className, day, period, nextEntry)) {
          return false;
        }
        subjectStore[key] = nextEntry;
        return true;
      }

      function createClassTable(className, periods) {
        const card = document.createElement("article");
        card.className = "class-card";

        const title = document.createElement("h2");
        title.className = "class-title";
        title.textContent = className;

        const table = document.createElement("table");
        table.setAttribute("aria-label", `${className} 시간표`);

        const thead = document.createElement("thead");
        const headerRow = document.createElement("tr");

        const corner = document.createElement("th");
        corner.scope = "col";
        corner.textContent = "교시";
        headerRow.appendChild(corner);

        days.forEach((day) => {
          const th = document.createElement("th");
          th.scope = "col";
          th.textContent = day;
          headerRow.appendChild(th);
        });

        thead.appendChild(headerRow);

        const tbody = document.createElement("tbody");

        periods.forEach((periodLabel, periodIndex) => {
          const row = document.createElement("tr");

          const periodCell = document.createElement("th");
          periodCell.scope = "row";
          periodCell.className = "period-col";
          periodCell.textContent = periodLabel;
          row.appendChild(periodCell);

          days.forEach((day) => {
            const cell = document.createElement("td");
            cell.className = "subject-cell";
            cell.setAttribute("tabindex", "0");
            cell.title = "클릭해서 과목 입력";

            const period = periodIndex + 1;
            const key = getCellKey(className, day, period);
            const currentEntry = subjectStore[key];

            cell.dataset.className = className;
            cell.dataset.day = day;
            cell.dataset.period = String(period);
            cell.textContent = getEntryDisplayText(currentEntry);

            const editCell = async () => {
              const existingEntry = subjectStore[key];
              const current = existingEntry ? existingEntry.subject : "";
              const value = window.prompt(
                `${className} ${day} ${period}교시 과목명을 입력하세요:`,
                current
              );

              if (value === null) return;

              const nextSubject = value.trim();
              if (!nextSubject) {
                delete subjectStore[key];
                cell.textContent = "";
                applySpecialistSlotColors();
                renderSpecialistTimetables();
                return;
              }

              let nextEntry = { subject: nextSubject };
              if (nextSubject === "체육") {
                const defaultPlace = existingEntry?.pePlace || "강당";
                const pePlace = await openPePlacePicker(defaultPlace);
                if (pePlace === null) return;
                nextEntry = { subject: "체육", pePlace };
              }

              if (!assignEntryToClassCell(className, day, period, nextEntry)) {
                return;
              }

              cell.textContent = getEntryDisplayText(nextEntry);
              applySpecialistSlotColors();
              renderSpecialistTimetables();
            };

            cell.addEventListener("click", editCell);
            cell.addEventListener("keydown", (event) => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                editCell();
              }
            });

            row.appendChild(cell);
          });

          tbody.appendChild(row);
        });

        table.append(thead, tbody);
        card.append(title, table);
        return card;
      }

      function renderTimetables() {
        const classes = buildClasses(classCount);
        const periods = buildPeriods(maxPeriodCount);

        timetableGrid.innerHTML = "";
        classes.forEach((className) => {
          timetableGrid.appendChild(createClassTable(className, periods));
        });

        applySpecialistSlotColors();
        renderSpecialistTimetables();
      }

      async function editSpecialistCell(tableName, day, period) {
        const promptText = `${tableName} 전담 ${day} ${period}교시에 배정할 반 번호를 입력하세요 (1~${classCount}, 비우려면 공백).`;
        const value = window.prompt(promptText, "");
        if (value === null) return;

        const trimmed = value.trim();
        const classes = buildClasses(classCount);
        const existingClass = classes.find((className) => {
          const entry = getEntry(className, day, period);
          return getEntryTableName(entry) === tableName;
        });

        if (!trimmed) {
          if (!existingClass) return;
          delete subjectStore[getCellKey(existingClass, day, period)];
          renderTimetables();
          return;
        }

        if (!/^\d+$/.test(trimmed)) {
          window.alert(`반 번호는 1~${classCount} 범위의 숫자만 입력할 수 있습니다.`);
          return;
        }

        const classNumber = Number(trimmed);
        if (classNumber < 1 || classNumber > classCount) {
          window.alert(`반 번호는 1~${classCount} 범위의 숫자만 입력할 수 있습니다.`);
          return;
        }

        const className = `${classNumber}반`;
        let nextEntry = { subject: tableName };
        if (tableName === "체육") {
          const defaultPlace =
            getEntry(className, day, period)?.pePlace || getEntry(existingClass, day, period)?.pePlace || "강당";
          const pePlace = await openPePlacePicker(defaultPlace);
          if (pePlace === null) return;
          nextEntry = { subject: "체육", pePlace };
        }

        if (!assignEntryToClassCell(className, day, period, nextEntry)) {
          return;
        }

        renderTimetables();
      }

      function renderSpecialistOptions() {
        subjectOptions.innerHTML = "";

        specialistSubjects.forEach((subject) => {
          const label = document.createElement("label");
          label.className = "subject-option";
          label.style.backgroundColor = subject.color;

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = subject.name;
          checkbox.checked = selectedSpecialists.has(subject.name);

          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              selectedSpecialists.add(subject.name);
            } else {
              selectedSpecialists.delete(subject.name);
            }
            applySpecialistSlotColors();
            renderSpecialistTimetables();
          });

          const text = document.createElement("span");
          text.textContent = subject.name;

          label.append(checkbox, text);
          subjectOptions.appendChild(label);
        });
      }

      function setupSpecialistDropdown() {
        specialistToggle.addEventListener("click", () => {
          const open = specialistMenu.classList.toggle("open");
          specialistToggle.setAttribute("aria-expanded", String(open));
        });

        document.addEventListener("click", (event) => {
          if (!event.target.closest(".specialist-picker")) {
            specialistMenu.classList.remove("open");
            specialistToggle.setAttribute("aria-expanded", "false");
          }
        });
      }

      function setupPePicker() {
        pePickerModal.querySelectorAll("[data-pe-place]").forEach((button) => {
          button.addEventListener("click", () => {
            closePePlacePicker(button.dataset.pePlace);
          });
        });

        pePickerCancel.addEventListener("click", () => {
          closePePlacePicker(null);
        });

        pePickerModal.addEventListener("click", (event) => {
          if (event.target === pePickerModal) {
            closePePlacePicker(null);
          }
        });
      }

      fillSelectOptions(classCountSelect, 1, 12, classCount);
      fillSelectOptions(periodCountSelect, 1, 9, maxPeriodCount);

      classCountSelect.addEventListener("change", (event) => {
        classCount = Number(event.target.value);
        renderTimetables();
      });

      periodCountSelect.addEventListener("change", (event) => {
        maxPeriodCount = Number(event.target.value);
        renderTimetables();
      });

      setupSpecialistDropdown();
      setupPePicker();
      renderSpecialistOptions();
      renderTimetables();
    </script>
  </body>
</html>
